<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Multi-OLT Pro</title>
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-container: #ffffff; --text-main: #2d3436;
            --border-color: #dfe6e9; --input-bg: #ffffff; --header-color: #0984e3;
            --card-before: #f8f9fa; --card-after: #f1f2f6;
        }
        [data-theme="dark"] {
            --bg-body: #121212; --bg-container: #1e1e1e; --text-main: #e0e0e0;
            --border-color: #333333; --input-bg: #252525; --header-color: #3498db;
            --card-before: #262626; --card-after: #2d2d2d;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); padding: 20px; color: var(--text-main); transition: 0.3s; }
        .container { max-width: 1400px; margin: auto; background: var(--bg-container); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--header-color); margin-bottom: 20px; padding-bottom: 15px; }
        
        .theme-control { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 12px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(22px); }

        .inputs { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; opacity: 0.7; }
        textarea { width: 100%; height: 150px; border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; font-family: 'Consolas', monospace; font-size: 11px; background: var(--input-bg); color: var(--text-main); transition: 0.2s; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        button.btn-main { flex: 4; background-color: var(--header-color); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button.btn-clear { flex: 1; background-color: #636e72; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background-color: var(--bg-container); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 12px; }
        
        .status-block { display: flex; flex-direction: column; gap: 4px; padding: 8px 12px; border-radius: 6px; background: var(--card-before); min-width: 110px; text-align: center; }
        .pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .pill-up { background: #2ecc71; }
        .pill-down { background: #e74c3c; }
        
        .waiting-msg { text-align: center; padding: 40px; border: 2px dashed var(--border-color); border-radius: 10px; opacity: 0.6; font-weight: bold; margin-top: 20px; }

        @keyframes pulse-red { 0%, 100% { background: rgba(231, 76, 60, 0.1); } 50% { background: rgba(231, 76, 60, 0.3); } }
        .row-caiu td { animation: pulse-red 1s infinite; border-color: #e74c3c !important; }
        .txt-caiu { color: #e74c3c; font-weight: bold; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .badge-vendor { font-size: 9px; padding: 2px 5px; border-radius: 3px; color: white; margin-bottom: 4px; display: inline-block; font-weight: bold; }
        .b-huawei { background: #c0392b; } .b-zte { background: #2980b9; } .b-nokia { background: #8e44ad; }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">Monitor Multi-OLT</h2>
            <div id="summary" style="font-size: 12px; opacity: 0.7;">Pronto para iniciar</div>
        </div>
        <div class="theme-control">
            <span>DIA</span>
            <label class="switch">
                <input type="checkbox" id="themeSwitch" onchange="toggleTheme()" checked>
                <span class="slider"></span>
            </label>
            <span>NOITE</span>
        </div>
    </div>
    
    <div class="inputs">
        <div class="input-group">
            <label>Log Referência (T1)</label>
            <textarea id="data1" placeholder="Cole os dados aqui..."></textarea>
        </div>
        <div class="input-group">
            <label>Log Atual (T2)</label>
            <textarea id="data2" placeholder="Cole os dados aqui..."></textarea>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main" onclick="compareData()">ANALISAR MUDANÇAS</button>
        <button class="btn-clear" onclick="limparTudo()">🗑️ LIMPAR TUDO</button>
    </div>

    <div id="tableContainer">
        <div class="waiting-msg">Aguardando dados nos dois campos para comparação...</div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playAlarm() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; 
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function toggleTheme() {
    document.body.setAttribute('data-theme', document.getElementById('themeSwitch').checked ? 'dark' : 'light');
}

function limparTudo() {
    document.getElementById('data1').value = '';
    document.getElementById('data2').value = '';
    document.getElementById('summary').innerHTML = 'Dados limpos';
    document.getElementById('tableContainer').innerHTML = '<div class="waiting-msg">Aguardando dados nos dois campos para comparação...</div>';
}

function translateStatus(raw) {
    if (!raw) return 'OFF';
    const s = raw.toLowerCase().trim();
    if (['up', 'online', 'working', 'enable'].includes(s)) return 'UP';
    if (['down', 'offline', 'los', 'dyinggasp', 'poweroff', 'disable', 'off'].includes(s)) return 'DOWN';
    return 'DOWN';
}

function parseLog(text) {
    if(!text.trim()) return new Map();
    const lines = text.split('\n');
    const dataMap = new Map();
    
    const nokiaRegex = /(\d+\/\d+\/\d+\/\d+)\s+([\d\/]+)\s+([A-Z0-9:]+)\s+.*?\s+(up|down)\s+([-\d.]+)?/i;
    const zteRegex = /(\d+\/\d+\/\d+[:\/]\d+)\s+.*?(working|los|dyinggasp|offline|down|up)/i;
    const huaweiData = /(\d+\/\s*\d+\/\d+)\s+(\d+)\s+([A-F0-9]{12,16})\s+.*?(online|offline|down|up)/i;

    lines.forEach(line => {
        let m;
        if (m = line.match(nokiaRegex)) {
            dataMap.set(m[3].trim(), { id: m[2], info: "Nokia", status: translateStatus(m[4]), raw: m[4], type: 'NOKIA' });
        } 
        else if (m = line.match(zteRegex)) {
            dataMap.set(m[1].trim(), { id: m[1], info: "ZTE", status: translateStatus(m[2]), raw: m[2], type: 'ZTE' });
        }
        else if (m = line.match(huaweiData)) {
            dataMap.set(m[3].trim(), { id: m[1]+":"+m[2], info: "Huawei", status: translateStatus(m[4]), raw: m[4], type: 'HUAWEI' });
        }
    });
    return dataMap;
}

function compareData() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const val1 = document.getElementById('data1').value.trim();
    const val2 = document.getElementById('data2').value.trim();
    const container = document.getElementById('tableContainer');

    // Validação de entrada
    if (!val1 || !val2) {
        container.innerHTML = '<div class="waiting-msg">⚠️ ERRO: Insira dados no campo Log Referência E no campo Log Atual para comparar.</div>';
        document.getElementById('summary').innerHTML = 'Aguardando preenchimento...';
        return;
    }

    const db1 = parseLog(val1);
    const db2 = parseLog(val2);
    
    // Início da montagem da tabela
    let html = `
        <table id="resultTable">
            <thead>
                <tr>
                    <th width="15%">Identificação</th>
                    <th width="25%">Serial / Descrição</th>
                    <th width="20%">Estado Anterior</th>
                    <th width="5%"></th>
                    <th width="20%">Estado Atual</th>
                    <th width="15%">Resultado</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>`;
    container.innerHTML = html;
    const tbody = document.getElementById('resultBody');

    const allKeys = new Set([...db1.keys(), ...db2.keys()]);
    let results = [];
    let falls = 0;

    allKeys.forEach(key => {
        const d1 = db1.get(key);
        const d2 = db2.get(key);
        
        const s1Norm = d1 ? d1.status : 'OFF';
        const s2Norm = d2 ? d2.status : 'OFF';
        
        let priority = 0, msg = 'Estável', rowClass = '';

        if (s1Norm === 'UP' && s2Norm === 'DOWN') {
            rowClass = 'row-caiu';
            msg = '<span class="txt-caiu">❌ QUEDA</span>';
            priority = 3;
            falls++;
        } else if (s1Norm === 'DOWN' && s2Norm === 'UP') {
            rowClass = 'row-subiu';
            msg = '<span style="color:#2ecc71; font-weight:bold;">✅ VOLTOU</span>';
            priority = 2;
        }

        if(d1 || d2) {
            results.push({
                id: d2?.id || d1?.id, key,
                type: d2?.type || d1?.type,
                s1Raw: d1?.raw || 'OFF', s2Raw: d2?.raw || 'OFF',
                s1Norm, s2Norm, rowClass, msg, priority
            });
        }
    });

    if (falls > 0) playAlarm();
    results.sort((a, b) => b.priority - a.priority);

    results.forEach(r => {
        const tr = document.createElement('tr');
        if(r.rowClass) tr.className = r.rowClass;
        tr.innerHTML = `
            <td style="font-family:monospace; font-size:11px;">${r.id}</td>
            <td><span class="badge-vendor b-${r.type.toLowerCase()}">${r.type}</span><br><b>${r.key}</b></td>
            <td><div class="status-block"><span class="pill pill-${r.s1Norm.toLowerCase()}">${r.s1Raw}</span></div></td>
            <td style="opacity:0.2; text-align:center;">→</td>
            <td><div class="status-block"><span class="pill pill-${r.s2Norm.toLowerCase()}">${r.s2Raw}</span></div></td>
            <td>${r.msg}</td>`;
        tbody.appendChild(tr);
    });

    document.getElementById('summary').innerHTML = `Finalizado: ${falls} queda(s).`;
}
</script>
</body>
</html>
