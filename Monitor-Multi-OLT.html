<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Multi-OLT Pro + Event Log</title>
    <style>
        :root {
            --bg-body: #f0f2f5; --bg-container: #ffffff; --text-main: #2d3436;
            --border-color: #dcdde1; --input-bg: #ffffff; --header-color: #0984e3;
            --warn-color: #f39c12; --log-bg: #f5f6fa; --log-card: #ffffff;
        }
        [data-theme="dark"] {
            --bg-body: #1a1c23; --bg-container: #242731; --text-main: #e2e8f0;
            --border-color: #313640; --input-bg: #1e2128; --header-color: #3498db;
            --log-bg: #111318; --log-card: #2a2f3a;
        }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); padding: 20px; color: var(--text-main); transition: background 0.3s; }
        .container { max-width: 1400px; margin: auto; background: var(--bg-container); padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; padding-bottom: 15px; }
        
        /* Log Design Moderno e Fino */
        .log-section { margin-bottom: 25px; background: var(--log-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .log-header { background: var(--header-color); color: white; padding: 6px 15px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; display: flex; justify-content: space-between; align-items: center; }
        .log-container { height: 160px; overflow-y: auto; padding: 8px; font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; }
        
        .log-entry { 
            background: var(--log-card); margin-bottom: 3px; padding: 4px 12px; border-radius: 4px; 
            display: grid; grid-template-columns: 70px 150px 110px 1fr; align-items: center;
            border-left: 3px solid #4a5568; transition: transform 0.1s;
        }
        .log-entry.entry-fail { border-left-color: #ff4757; background: rgba(255, 71, 87, 0.08); }
        .log-entry.entry-recover { border-left-color: #2ed573; background: rgba(46, 213, 115, 0.08); }
        .log-entry.entry-warn { border-left-color: #ffa502; background: rgba(255, 165, 2, 0.08); }

        .log-time { color: #718096; font-size: 10px; }
        .log-fail { color: #ff4757; font-weight: 800; }
        .log-recover { color: #2ed573; font-weight: 800; }
        .log-warn { color: #ffa502; font-weight: 800; }

        .theme-control { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 11px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4a5568; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(20px); }

        .inputs { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; color: var(--header-color); letter-spacing: 0.5px; }
        textarea { width: 100%; height: 100px; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; background: var(--input-bg); color: var(--text-main); transition: border 0.2s; outline: none; }
        textarea:focus { border-color: var(--header-color); }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        button.btn-main { flex: 4; background: linear-gradient(135deg, #0984e3, #0061af); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 15px rgba(9, 132, 227, 0.2); }
        button.btn-main:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.btn-clear { flex: 1; background-color: #4a5568; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        th { font-size: 10px; text-transform: uppercase; padding: 10px; color: #718096; font-weight: 700; }
        td { background-color: var(--input-bg); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 8px 12px; vertical-align: middle; }
        td:first-child { border-left: 1px solid var(--border-color); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        td:last-child { border-right: 1px solid var(--border-color); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        
        .status-pill {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 4px; border-radius: 6px; font-weight: 800; font-size: 10px; color: #fff;
            min-width: 100px; text-transform: uppercase;
        }
        .st-up { background-color: #2ed573; }
        .st-down { background-color: #ff4757; }
        .st-warn { background-color: #ffa502; }
        .st-off { background-color: #747d8c; }

        .signal-badge { font-size: 13px; margin-top: 2px; font-weight: 700; background: rgba(0, 0, 0, 0.15); padding: 1px 6px; border-radius: 4px; }
        .waiting-msg { text-align: center; padding: 40px; border: 2px dashed var(--border-color); border-radius: 12px; color: #718096; font-size: 13px; margin-top: 20px; }

        @keyframes alert-pulse { 0% { background: rgba(255, 71, 87, 0.03); } 50% { background: rgba(255, 71, 87, 0.12); } 100% { background: rgba(255, 71, 87, 0.03); } }
        .row-caiu td { animation: alert-pulse 1.5s infinite; border-color: rgba(255, 71, 87, 0.3) !important; }
        .txt-caiu { color: #ff4757; font-weight: 900; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .badge-vendor { font-size: 8px; padding: 1px 5px; border-radius: 4px; color: white; margin-bottom: 3px; display: inline-block; font-weight: 800; }
        .b-huawei { background: #d63031; } .b-zte { background: #0984e3; } .b-nokia { background: #6c5ce7; } .b-datacom { background: #e67e22; }
        .serial-text { font-size: 12px; color: var(--header-color); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0; font-size: 1.3em; letter-spacing: -0.5px;">Monitor Multi-OLT <small style="font-size: 11px; font-weight: 400; opacity: 0.6;">v2.5 Pro</small></h2>
            <div id="summary" style="font-size: 11px; font-weight: 600; color: var(--header-color);">Pronto para análise</div>
        </div>
        <div class="theme-control">
            <span>MODO CLARO</span>
            <label class="switch">
                <input type="checkbox" id="themeSwitch" onchange="toggleTheme()" checked>
                <span class="slider"></span>
            </label>
            <span>ESCURO</span>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>LOG DE EVENTOS EM TEMPO REAL</span>
            <span id="logCounter">0 REGISTROS</span>
        </div>
        <div class="log-container" id="eventLog">
            <div style="opacity: 0.3; text-align: center; padding-top: 60px;">Aguardando alterações de rede...</div>
        </div>
    </div>
    
    <div class="inputs">
        <div class="input-group">
            <label>Referência (T1)</label>
            <textarea id="data1" placeholder="Cole os logs de referência..."></textarea>
        </div>
        <div class="input-group">
            <label>Estado Atual (T2)</label>
            <textarea id="data2" placeholder="Cole os logs atuais..."></textarea>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main" onclick="compareData()">EXECUTAR ANÁLISE DE MUDANÇAS</button>
        <button class="btn-clear" onclick="limparTudo()">REDEFINIR</button>
    </div>

    <div id="tableContainer">
        <div class="waiting-msg">Insira os dados acima para gerar o relatório comparativo.</div>
    </div>
</div>

<script>
// Mantendo a lógica de negócio original intacta
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const statusTracker = new Map(); 
let eventCount = 0;

function playAlarm() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; 
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function toggleTheme() {
    document.body.setAttribute('data-theme', document.getElementById('themeSwitch').checked ? 'dark' : 'light');
}

function limparTudo() {
    document.getElementById('data1').value = '';
    document.getElementById('data2').value = '';
    document.getElementById('tableContainer').innerHTML = '<div class="waiting-msg">Insira os dados acima para gerar o relatório comparativo.</div>';
    document.getElementById('eventLog').innerHTML = '<div style="opacity: 0.3; text-align: center; padding-top: 60px;">Aguardando alterações de rede...</div>';
    document.getElementById('summary').innerText = 'Pronto para análise';
    document.getElementById('logCounter').innerText = '0 REGISTROS';
    eventCount = 0;
    statusTracker.clear(); 
}

function addLogEntry(type, serial, port, message) {
    const logContainer = document.getElementById('eventLog');
    if (logContainer.innerText.includes("Aguardando")) logContainer.innerHTML = "";
    
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                    now.getMinutes().toString().padStart(2, '0') + ":" + 
                    now.getSeconds().toString().padStart(2, '0');
    
    let typeClass = ""; let entryClass = "";
    if (type === "FAIL") { typeClass = "log-fail"; entryClass = "entry-fail"; }
    if (type === "RECOVER") { typeClass = "log-recover"; entryClass = "entry-recover"; }
    if (type === "WARN") { typeClass = "log-warn"; entryClass = "entry-warn"; }

    const entry = document.createElement('div');
    entry.className = `log-entry ${entryClass}`;
    entry.innerHTML = `
        <span class="log-time">[${timeStr}]</span> 
        <span><b>${serial}</b></span> 
        <span style="opacity:0.6; font-size: 9px;">P: ${port}</span> 
        <span class="${typeClass}">${message}</span>
    `;
    
    logContainer.prepend(entry);
    eventCount++;
    document.getElementById('logCounter').innerText = `${eventCount} REGISTROS`;
}

function translateStatus(raw) {
    if (!raw) return 'OFF';
    const s = raw.toLowerCase().trim();
    if (['up', 'online', 'working', 'enable', 'ready', 'normal', 'match'].includes(s)) return 'UP';
    if (['offline', 'down', 'los', 'dyinggasp'].includes(s)) return 'DOWN';
    return 'OFF';
}

function formatSignal(val) {
    if (!val || val === "-" || val === "invalid" || val === "1" || val.toUpperCase() === "N/A") return "0.00";
    return val;
}

function parseLog(text) {
    if(!text.trim()) return new Map();
    const cleanText = text.replace(/ \[[0-9;]*[mK]/g, '').replace(/--More--/g, '');
    const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l !== "");
    const zteAccumulator = new Map();
    const dataMap = new Map();
    
    const nokiaHoriz = /(\d+\/\d+\/\d+\/\d+)\s+([\d\/]+)\s+([A-Z0-9:]+)\s+.*?\s+(up|down)\s+([-\d.]+)?/i;
    const huaweiHoriz = /(\d+\/\s*\d+\/\d+)\s+(\d+)\s+([A-F0-9]{12,16})\s+.*?(online|offline|down|up)\s*([-\d.]+)?/i;
    const datacomRegex = /^(\d+\/\d+\/\d+)\s+(\d+)\s+([A-Z0-9]{12})\s+(Up|Down)/i;
    const zteStateRegex = /^(?:gpon-onu_)?(\d+\/\d+\/\d+[:\/]\d+)\s+(?:enable|disable)\s+(?:enable|disable)\s+(working|los|dyinggasp|offline|down|up)/i;
    const ztePowerRegex = /^(?:gpon-onu_)?(\d+\/\d+\/\d+[:\/]\d+)\s+([-\d.]+)\(dbm\)/i;
    const zteSerialRegex = /^(?:gpon-onu_)?(\d+\/\d+\/\d+[:\/]\d+)\s+.*SN:(ZTE[A-Z0-9]+)/i;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        let m;

        if (line.match(/^\d+\/\d+\/\d+$/)) {
            let pont = line; let id = lines[i+1]; let sn = lines[i+2]; let runState = "";
            for(let j=i+3; j<i+10 && j<lines.length; j++){
                if(lines[j].toLowerCase().includes("online") || lines[j].toLowerCase().includes("offline")){
                    runState = lines[j]; break;
                }
            }
            if (sn && sn.length >= 12 && runState) {
                dataMap.set(sn.trim(), { id: pont + ":" + id, status: translateStatus(runState), raw: runState, type: 'HUAWEI', signal: "0.00" });
            }
        }
        else if (m = line.match(zteStateRegex)) {
            const id = m[1].replace(':', '/');
            const obj = zteAccumulator.get(id) || { id: id, type: 'ZTE', status: 'OFF', raw: 'OFF', signal: '0.00', serial: id };
            obj.status = translateStatus(m[2]); obj.raw = m[2]; zteAccumulator.set(id, obj);
        } 
        else if (m = line.match(ztePowerRegex)) {
            const id = m[1].replace(':', '/');
            const obj = zteAccumulator.get(id) || { id: id, type: 'ZTE', status: 'OFF', raw: 'OFF', signal: '0.00', serial: id };
            obj.signal = formatSignal(m[2]); zteAccumulator.set(id, obj);
        }
        else if (m = line.match(zteSerialRegex)) {
            const id = m[1].replace(':', '/');
            const obj = zteAccumulator.get(id) || { id: id, type: 'ZTE', status: 'OFF', raw: 'OFF', signal: '0.00', serial: id };
            obj.serial = m[2]; zteAccumulator.set(id, obj);
        }
        else if (m = line.match(datacomRegex)) {
            dataMap.set(m[3].trim(), { id: m[1] + " ID:" + m[2], status: translateStatus(m[4]), raw: m[4], type: 'DATACOM', signal: "0.00" });
        }
        else if (m = line.match(nokiaHoriz)) {
            dataMap.set(m[3].trim(), { id: m[2], status: translateStatus(m[4]), raw: m[4], type: 'NOKIA', signal: formatSignal(m[5]) });
        }
        else if (m = line.match(huaweiHoriz)) {
            dataMap.set(m[3].trim(), { id: m[1]+":"+m[2], status: translateStatus(m[4]), raw: m[4], type: 'HUAWEI', signal: formatSignal(m[5]) });
        }
        else if (line.match(/^[A-Z0-9]{4}:[A-F0-9]{8}$/i)) {
            let id = lines[i-1] || "N/A"; let status = lines[i+2] || "down"; let signal = lines[i+3] || "-";
            dataMap.set(line, { id, status: translateStatus(status), raw: status, type: 'NOKIA', signal: formatSignal(signal) });
        }
    }
    zteAccumulator.forEach((val) => { dataMap.set(val.serial, val); });
    return dataMap;
}

function compareData() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const val1 = document.getElementById('data1').value.trim();
    const val2 = document.getElementById('data2').value.trim();
    const container = document.getElementById('tableContainer');
    if (!val1 || !val2) return;

    const db1 = parseLog(val1); const db2 = parseLog(val2);
    let html = `<table><thead><tr><th>PONT/ID</th><th>Equipamento</th><th style="text-align:center;">Referência (T1)</th><th style="text-align:center;">Atual (T2)</th><th>Diagnóstico</th></tr></thead><tbody id="resultBody"></tbody></table>`;
    container.innerHTML = html;
    const tbody = document.getElementById('resultBody');

    const allKeys = new Set([...db1.keys(), ...db2.keys()]);
    let results = [], falls = 0, signalAlerts = 0;

    allKeys.forEach(key => {
        const d1 = db1.get(key); const d2 = db2.get(key);
        const s1Norm = d1 ? d1.status : 'OFF'; const s2Norm = d2 ? d2.status : 'OFF';
        const sig1 = d1?.signal || "0.00"; const sig2 = d2?.signal || "0.00";
        
        const lastStatus = statusTracker.get(key) || s1Norm;
        let priority = 0, msg = '<span style="opacity:0.4;">Estável</span>', rowClass = '', sigClass = '';

        if (lastStatus === 'UP' && s2Norm === 'DOWN') { 
            rowClass = 'row-caiu'; 
            msg = '<span class="txt-caiu">❌ QUEDA</span>'; 
            priority = 3; falls++; 
            addLogEntry("FAIL", key, d2?.id || d1?.id, "ALARME LOS - LINK DOWN");
            statusTracker.set(key, 'DOWN'); 
        }
        else if (lastStatus === 'DOWN' && s2Norm === 'UP') { 
            msg = '<span style="color:#2ed573; font-weight:bold;">✅ RECUPERADO</span>'; 
            priority = 2; 
            addLogEntry("RECOVER", key, d2?.id || d1?.id, "REESTABELECIDO - ONLINE");
            statusTracker.set(key, 'UP'); 
        } else {
            statusTracker.set(key, s2Norm);
        }

        if (sig1 !== "0.00" && sig2 !== "0.00") {
            const diff = Math.abs(parseFloat(sig1) - parseFloat(sig2));
            if (diff >= 3) { 
                sigClass = 'signal-warn'; 
                if (priority < 2) msg = '<span style="color:#ffa502; font-weight:bold;">⚠️ OSCILAÇÃO</span>'; 
                priority = Math.max(priority, 1); signalAlerts++; 
                addLogEntry("WARN", key, d2?.id || d1?.id, `SINAL: ${sig1} ➜ ${sig2} dBm`);
            }
        }

        results.push({ id: d2?.id || d1?.id, key, type: d2?.type || d1?.type, s1Raw: d1?.raw || 'OFF', s2Raw: d2?.raw || 'OFF', s1Norm, s2Norm, sig1, sig2, sigClass, rowClass, msg, priority });
    });

    if (falls > 0 || signalAlerts > 0) playAlarm();
    results.sort((a, b) => b.priority - a.priority);

    results.forEach(r => {
        const tr = document.createElement('tr'); if(r.rowClass) tr.className = r.rowClass;
        let colorClass1 = r.s1Norm === 'UP' ? 'st-up' : (r.s1Norm === 'OFF' ? 'st-off' : 'st-down');
        let colorClass2 = r.s2Norm === 'UP' ? 'st-up' : (r.s2Norm === 'OFF' ? 'st-off' : 'st-down');
        tr.innerHTML = `<td style="font-size:10px; opacity:0.7;">${r.id}</td><td><span class="badge-vendor b-${r.type.toLowerCase()}">${r.type}</span><br><b class="serial-text">${r.key}</b></td><td align="center"><div class="status-pill ${colorClass1}">${r.s1Raw}<div class="signal-badge">${r.sig1}</div></div></td><td align="center"><div class="status-pill ${colorClass2}">${r.s2Raw}<div class="signal-badge">${r.sig2}</div></div></td><td>${r.msg}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('summary').innerHTML = `${falls} QUEDAS | ${signalAlerts} OSCILAÇÕES | ${allKeys.size} TOTAL`;
}
</script>
</body>
</html>
