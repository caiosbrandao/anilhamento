<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro de Atendimento - Pro v2.0</title>
    <style>
        :root {
            --bg-body: #0d1117; --bg-container: #161b22; --text-main: #c9d1d9;
            --border-color: #30363d; --input-bg: #0d1117; --header-color: #58a6ff;
            --card-before: #21262d; --accent-green: #00b894; --accent-red: #d63031;
            --accent-orange: #e67e22; --accent-purple: #a29bfe;
            --soft-error: rgba(214, 48, 49, 0.25);
            --soft-error-border: #852626;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); padding: 20px; color: var(--text-main); margin: 0; text-transform: uppercase; }
        .container { max-width: 1450px; margin: auto; background: var(--bg-container); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); position: relative; }
        
        .input-error {
            border: 1px solid var(--soft-error-border) !important;
            background: var(--soft-error) !important;
            animation: pulse-soft 2s infinite alternate;
        }
        @keyframes pulse-soft {
            from { box-shadow: 0 0 2px var(--soft-error-border); }
            to { box-shadow: 0 0 8px var(--soft-error-border); }
        }

        .tabs-nav { display: flex; gap: 5px; margin-bottom: -1px; align-items: center; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 18px; cursor: pointer; background: #21262d; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px 8px 0 0; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: var(--bg-container); border-bottom: 2px solid var(--header-color); color: var(--header-color); }
        .btn-close-tab { font-size: 14px; opacity: 0.5; transition: 0.3s; padding: 2px 5px; border-radius: 4px; }
        .btn-close-tab:hover { opacity: 1; background: var(--accent-red); color: white; }
        
        .btn-add-tab { background: var(--accent-green); color: white; border: none; border-radius: 6px; width: 35px; height: 35px; cursor: pointer; font-weight: bold; font-size: 20px; margin-left: 10px; flex-shrink: 0; }
        
        .tab-content { display: none; border: 1px solid var(--border-color); padding: 25px; border-radius: 0 10px 10px 10px; background: var(--bg-container); animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--accent-green); color: white; padding: 15px 30px; border-radius: 8px; font-weight: 800; font-size: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.5s ease 2.5s forwards; border-left: 6px solid #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: var(--bg-container); border: 1px solid var(--accent-red); border-radius: 15px; padding: 35px; width: 420px; text-align: center; box-shadow: 0 0 40px rgba(214, 48, 49, 0.3); animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-card h2 { color: var(--accent-red); margin-top: 0; font-size: 20px; letter-spacing: 1px; }
        .modal-card p { color: var(--text-main); font-size: 13px; margin: 20px 0; line-height: 1.6; }
        .modal-btns { display: flex; gap: 12px; justify-content: center; }
        .btn-modal { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; flex: 1; }
        .btn-modal-confirm { background: var(--accent-red); color: white; }
        .btn-modal-confirm:hover { background: #ff7675; transform: scale(1.05); }
        .btn-modal-cancel { background: #485e74; color: white; }

        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-group { margin-bottom: 10px; position: relative; }
        .input-group label { font-size: 10px; font-weight: 700; margin-bottom: 4px; display: block; color: #8b949e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); font-size: 12px; box-sizing: border-box; outline: none; text-transform: uppercase; transition: 0.3s; }
        
        .btn-open-link { position: absolute; right: 5px; top: 18px; background: var(--accent-orange); border: none; border-radius: 4px; color: white; padding: 4px 8px; cursor: pointer; font-size: 12px; display: none; z-index: 5; }

        .saturada-container { background: #1e1515; border: 1px solid var(--accent-red); border-radius: 8px; padding: 20px; margin-top: 25px; display: none; }
        .saturada-container.active { display: block; animation: slideDown 0.3s ease; }

        .portas-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: var(--card-before); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .porta-item { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: bold; }
        .porta-item input { height: 28px; padding: 4px 8px; }
        
        .porta-conflito { 
            border: 2px solid var(--accent-orange) !important; 
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.5);
            background: #2c1a0a !important;
            animation: pulse-orange 1.5s infinite;
        }

        .resumo-atendimento {
            margin-top: 12px;
            padding: 8px;
            background: #1c2128;
            border: 1px solid var(--header-color);
            border-radius: 8px;
        }
        .resumo-atendimento h4 {
            color: var(--header-color);
            margin: 0 0 8px 0;
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }
        .resumo-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
        }
        .resumo-item {
            background: #0d1117;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            min-height: 38px;
        }
        .resumo-item:hover { background: #161b22; border-color: var(--header-color); }
        .resumo-label { color: #8b949e; display: block; margin-bottom: 1px; font-size: 9px; font-weight: 600; pointer-events: none; }
        .resumo-valor {
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            pointer-events: none;
        }
        .resumo-item.orange .resumo-valor { color: var(--accent-orange); }
        .resumo-item.full-width { grid-column: span 3; }
        .copy-icon-small { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); font-size: 10px; opacity: 0.2; }
        .resumo-item:hover .copy-icon-small { opacity: 0.8; color: var(--header-color); }

        .btn-icon-small { 
            background: none; border: none; color: var(--accent-purple); cursor: pointer; font-size: 16px; 
            padding: 0 5px; opacity: 0.7; transition: 0.2s; 
        }
        .btn-icon-small:hover { opacity: 1; transform: scale(1.2); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-primary { background: var(--header-color); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; flex: 1; text-transform: uppercase; min-width: 150px; transition: 0.3s; }
        .btn-sat-toggle { background: var(--accent-orange); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; padding: 12px; flex: 1; min-width: 150px; }
        .btn-copy { background: var(--accent-green); color: white; display: none; margin-top: 10px; width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; }
        .btn-finish { background: var(--accent-green); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; padding: 12px; flex: 1; min-width: 150px; transition: 0.3s; }
        .btn-clear { background: #485e74; color: white; width: 60px; border: none; border-radius: 6px; cursor: pointer; }
        
        .script-output { background: #011627; color: #addb67; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; display: none; white-space: pre-wrap; border-left: 4px solid var(--accent-green); font-size: 12px; margin-top: 15px; }
        .sat-output { border-left: 4px solid var(--accent-red); color: #ff9ff3; line-height: 1.4; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .history-table th, .history-table td { padding: 12px; border: 1px solid var(--border-color); text-align: left; }
        .history-table th { background: var(--card-before); color: var(--header-color); }
        .btn-action { padding: 6px; cursor: pointer; border-radius: 4px; border: none; color: white; margin-right: 4px; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .metric-card { background: #1c2128; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--accent-purple); }
        .metric-day { font-size: 10px; color: #8b949e; margin-bottom: 5px; font-weight: bold; }
        .metric-qty { font-size: 20px; font-weight: 800; color: var(--header-color); }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="modalConfirm" class="modal-overlay">
    <div class="modal-card">
        <h2 id="modalTitle">⚠️ ATENÇÃO</h2>
        <p id="modalMessage">VOCÊ TEM CERTEZA DISSO?</p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" onclick="fecharModal()">CANCELAR</button>
            <button id="btnModalConfirmAction" class="btn-modal btn-modal-confirm">CONFIRMAR</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="tabs-nav" id="main-nav">
        <button class="btn-add-tab" title="Nova Aba" onclick="adicionarNovaAba()">+</button>
        <button class="tab-btn" id="btn-historico" style="margin-left: auto; color: var(--accent-green);" onclick="showTab('tab-historico', this)">🗄️ HISTÓRICO</button>
    </div>

    <div id="at-area"></div>

    <div id="tab-historico" class="tab-content">
        <h3 style="color:var(--accent-green)">🗄️ RESUMO DOS ÚLTIMOS 7 DIAS</h3>
        <div class="metrics-grid" id="metrics-daily"></div>
        <input type="text" id="inputBusca" style="margin-bottom:15px; padding:12px;" placeholder="🔍 BUSCAR NO HISTÓRICO..." onkeyup="filtrarHistorico()">
        <div style="overflow-x: auto;">
            <table class="history-table" id="tabelaHist">
                <thead>
                    <tr><th>DATA/HORA</th><th>ID CHAT</th><th>OS</th><th>CTO</th><th>CORREÇÃO</th><th>OBS</th><th>AÇÕES</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let abaCount = 0;
let idParaRemover = null;

window.onload = function() {
    adicionarNovaAba();
    carregarHistorico();
};

function showToast(msg, color = 'var(--accent-green)') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = color;
    toast.innerHTML = `<span>📂</span> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }

function abrirModalPersonalizado(titulo, msg, acaoConfirmar, corBotao = 'var(--accent-red)') {
    document.getElementById('modalTitle').innerText = titulo;
    document.getElementById('modalMessage').innerText = msg;
    const btn = document.getElementById('btnModalConfirmAction');
    btn.style.background = corBotao;
    btn.onclick = () => { acaoConfirmar(); fecharModal(); };
    document.getElementById('modalConfirm').style.display = 'flex';
}

function abrirModalExcluir(id) {
    idParaRemover = id;
    abrirModalPersonalizado("⚠️ CONFIRMAR EXCLUSÃO", "VOCÊ REALMENTE DESEJA ELIMINAR ESTE REGISTRO DO HISTÓRICO?", confirmarExclusao);
}

function confirmarExclusao() {
    let hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    hist = hist.filter(x => x.id_reg != idParaRemover);
    localStorage.setItem('atend_logs_v10', JSON.stringify(hist));
    carregarHistorico();
    showToast("REGISTRO EXCLUÍDO!", "var(--accent-red)");
}

function validarCamposTempoReal(abaId) {
    const aba = document.getElementById(abaId);
    if (!aba) return;
    const camposObrigatorios = ['.at_chat', '.at_os', '.at_cto', '.at_caminho_rede', '.at_contrato', '.at_nome_cli', '.at_plib_num'];
    camposObrigatorios.forEach(seletor => {
        const campo = aba.querySelector(seletor);
        if (campo) {
            if (!campo.value.trim()) { campo.classList.add('input-error'); } 
            else { campo.classList.remove('input-error'); }
        }
    });
}

function adicionarNovaAba() {
    abaCount++;
    const id = `tab-at-${abaCount}`;
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = `btn-${id}`;
    btn.innerHTML = `📝 ATEND. ${abaCount} ${abaCount > 1 ? `<span class="btn-close-tab" onclick="fecharAba(event, '${id}')">✖</span>` : ''}`;
    btn.onclick = (e) => showTab(id, btn);
    document.querySelector('.btn-add-tab').before(btn);

    const html = `
    <div id="${id}" class="tab-content">
        <input type="hidden" class="at_id_reg" value="">
        <details class="import-box" open>
            <summary>📥 IMPORTAR SCRIPT DE CAMPO</summary>
            <textarea class="at_import_texto" style="height: 120px; text-transform: none;" placeholder="COLE O SCRIPT DO TÉCNICO AQUI..."></textarea>
            <button class="btn-primary" style="background: var(--accent-purple); margin-top:10px;" onclick="processarScriptIndividual('${id}')">PROCESSAR DADOS</button>
        </details>
        <div class="grid-main">
            <div>
                <h3 style="color:var(--header-color)">📋 REGISTRO DE ATENDIMENTO <span id="status-interfocus" style="font-size: 12px; margin-left: 10px;"></span></h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;" oninput="validarCamposTempoReal('${id}')">
                    <div class="input-group"><label>ID CHAT</label><input type="text" class="at_chat" oninput="sincronizarResumo('${id}')"></div>
                    <div class="input-group"><label>ORDEM DE SERVIÇO</label><input type="text" class="at_os" oninput="sincronizarResumo('${id}')"></div>
                    <div class="input-group"><label>CONTRATO CLIENTE</label><input type="text" class="at_contrato" id="at_contrato_field" oninput="sincronizarPortaAuto('${id}')"></div>
                    <div class="input-group"><label>NOME COMPLETO CLIENTE</label><input type="text" class="at_nome_cli" oninput="sincronizarPortaAuto('${id}')"></div>
                    <div class="input-group" style="grid-column:span 2"><label>ID CTO</label><input type="text" class="at_cto" oninput="puxarCaminhoRedeAutomatico('${id}', this.value); sincronizarResumo('${id}');"></div>
                    <div class="input-group" style="grid-column:span 2"><label>CAMINHO DE REDE CTO</label><input type="text" class="at_caminho_rede"></div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>MODELO CTO</label>
                        <select class="at_modelo_cto" onchange="atualizarInterfaceAT('${id}', this.value); validarCamposTempoReal('${id}');">
                            <option value="16 PORTAS">16 PORTAS</option>
                            <option value="8 PORTAS">8 PORTAS</option>
                        </select>
                    </div>
                    <div class="input-group"><label>PORTA UTILIZADA</label><select class="at_plib_id" onchange="sincronizarPortaAuto('${id}')"></select></div>
                    <div class="input-group"><label>ID PORTA RETIRADA</label><input type="text" class="at_plib_num" oninput="sincronizarResumo('${id}')"></div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>CORREÇÃO DE CAMINHO DA PORTA LIBERADA ?</label>
                        <select class="at_correcao_caminho"><option value="NAO">NÃO</option><option value="SIM">SIM</option></select>
                    </div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>OBSERVAÇÕES</label>
                        <select class="at_obs_select" onchange="toggleObsManual('${id}', this.value)">
                            <option value="SEM OBSERVAÇÕES ADICIONAIS.">SELECIONE UMA OPÇÃO...</option>
                            <option value="CTO MAIS PROXIMA DA CASA DO CLIENTE.">CTO MAIS PROXIMA DA CASA DO CLIENTE.</option>
                            <option value="USOU A PORTA RESERVADA PARA O CLIENTE">USOU A PORTA RESERVADA PARA O CLIENTE</option>
                            <option value="MANUAL">OUTRO...</option>
                        </select>
                        <textarea class="at_obs_manual" style="display:none; margin-top:10px;"></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="gerarScript('${id}')">🚀 GERAR SCRIPT</button>
                    <button class="btn-finish" id="btn-finish-${id}" onclick="salvarAtendimento('${id}')">✅ SALVAR NO HISTÓRICO</button>
                    <button class="btn-sat-toggle" onclick="toggleSaturada('${id}')">⚠️ RELATAR SATURAÇÃO</button>
                    <button class="btn-clear" onclick="limparForm('${id}')">🗑️</button>
                </div>
                <div class="script-output at-output"></div>
                <button class="btn-copy" onclick="copiarScript(this)">📋 COPIAR SCRIPT</button>
            </div>
            <div>
                <h3 style="opacity:0.7; display: flex; align-items: center; gap: 8px;">🔌 MAPEAR PORTAS <button class="btn-icon-small" title="Copiar Mapa de Portas" onclick="copiarSomentePortas('${id}')">📋</button></h3>
                <div class="portas-container" id="grid-${id}"></div>
                <div class="resumo-atendimento">
                    <h4>🔍 RESUMO OPERACIONAL</h4>
                    <div class="resumo-grid">
                        <div class="resumo-item orange" onclick="copiarValorResumo(this)"><span class="resumo-label">ID CHAT</span><span class="resumo-valor res-chat">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item orange" onclick="copiarValorResumo(this)"><span class="resumo-label">O.S.</span><span class="resumo-valor res-os">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item" onclick="copiarValorResumo(this)"><span class="resumo-label">CONTRATO</span><span class="resumo-valor res-contrato">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item" onclick="copiarValorResumo(this)"><span class="resumo-label">ID CTO</span><span class="resumo-valor res-cto">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item orange" onclick="copiarValorResumo(this)"><span class="resumo-label">PORTA RETIRADA</span><span class="resumo-valor res-porta-retirada">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item" onclick="copiarValorResumo(this)"><span class="resumo-label">CIDADE/UF</span><span class="resumo-valor res-cidade">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item full-width" onclick="copiarValorResumo(this)"><span class="resumo-label">NOME CLIENTE</span><span class="resumo-valor res-nome">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item full-width" onclick="copiarValorResumo(this)"><span class="resumo-label">COORD. CTO PRÓXIMA</span><span class="resumo-valor res-loc-cto">-</span><span class="copy-icon-small">📋</span></div>
                        <div class="resumo-item full-width" onclick="copiarValorResumo(this)"><span class="resumo-label">COORD. CLIENTE</span><span class="resumo-valor res-loc-cli">-</span><span class="copy-icon-small">📋</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="sat-form-${id}" class="saturada-container">
            <h3 style="color:var(--accent-red); margin-top:0;">🚫 RELATÓRIO DE CTO SATURADA</h3>
            <div class="grid-main">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group"><label>BKO RESPONSÁVEL</label><input type="text" class="sat_bko" value="CAIO BRANDÃO"></div>
                    <div class="input-group"><label>DATA</label><input type="text" class="sat_data"></div>
                    <div class="input-group"><label>CIDADE/UF</label><input type="text" class="sat_cidade" oninput="sincronizarResumo('${id}')"></div>
                    <div class="input-group"><label>ORDEM DE SERVIÇO (ATENDIMENTO)</label><input type="text" class="sat_cliente"></div>
                    <div class="input-group"><label>CTO VALIDADA</label><input type="text" class="sat_ctovald"></div>
                    <div class="input-group">
                        <label>COORDENADAS CLIENTE</label>
                        <input type="text" class="sat_loc_cli" oninput="monitorarCoordenadas('${id}', this.value, this); sincronizarResumo('${id}');">
                        <button class="btn-open-link" onclick="abrirLinkExterno(this)">🌐</button>
                    </div>
                    <div class="input-group" style="grid-column: span 2"><label>MOTIVO / PARECER TÉCNICO</label><textarea class="sat_obs"></textarea></div>
                </div>
                <div>
                    <div class="input-group">
                        <label>COORDENADAS CTO MAIS PROXIMA</label>
                        <input type="text" class="sat_loc_cto_ordem" oninput="monitorarCoordenadas('${id}', this.value, this); sincronizarResumo('${id}');">
                        <button class="btn-open-link" onclick="abrirLinkExterno(this)">🌐</button>
                    </div>
                    <button class="btn-primary" style="background: var(--accent-orange); width:100%; margin-top:25px;" onclick="gerarScriptSaturada('${id}')">🚀 GERAR RELATÓRIO TÉCNICO</button>
                </div>
            </div>
            <div class="script-output sat-output"></div>
            <button class="btn-copy" onclick="copiarScript(this)">📋 COPIAR RELATÓRIO PROFISSIONAL</button>
        </div>
    </div>`;
    
    document.getElementById('at-area').insertAdjacentHTML('beforeend', html);
    atualizarInterfaceAT(id, "16 PORTAS");
    document.getElementById(id).querySelector('.sat_data').value = new Date().toLocaleDateString('pt-BR');
    validarCamposTempoReal(id);
    showTab(id, btn);
}

function atualizarMetricas() {
    const hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    const metricasDiv = document.getElementById('metrics-daily');
    if (!metricasDiv) return;
    const contagemDias = {};
    for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        contagemDias[d.toLocaleDateString('pt-BR')] = 0;
    }
    hist.forEach(r => { const dt = r.timestamp.split(',')[0].trim(); if (contagemDias.hasOwnProperty(dt)) contagemDias[dt]++; });
    metricasDiv.innerHTML = Object.keys(contagemDias).map(dia => `
        <div class="metric-card">
            <div class="metric-day">${dia === new Date().toLocaleDateString('pt-BR') ? 'HOJE' : dia}</div>
            <div class="metric-qty">${contagemDias[dia]}</div>
        </div>
    `).reverse().join('');
}

function gerarScriptSaturada(id) {
    const aba = document.getElementById(id);
    const getVal = (cls) => (aba.querySelector('.'+cls).value || '').toUpperCase().trim();
    let script = `// CTO SATURADA //\nBKO: ${getVal('sat_bko')}\nDATA: ${getVal('sat_data')}\nID CHAT: ${getVal('at_chat')}\nCIDADE: ${getVal('sat_cidade')}\nCLIENTE: ${getVal('sat_cliente')}\nCTO VALIDADA: ${getVal('sat_ctovald')}\nLOC. CLIENTE: ${getVal('sat_loc_cli')}\nLOC. CTO: ${getVal('sat_loc_cto_ordem')}\nOBS: ${getVal('sat_obs')}`;
    const out = aba.querySelector(`#sat-form-${id} .sat-output`);
    out.innerText = script; out.style.display = 'block';
    aba.querySelector(`#sat-form-${id} .btn-copy`).style.display = 'block';
}

function copiarValorResumo(elemento) {
    const valor = elemento.querySelector('.resumo-valor').innerText;
    if (valor !== "-") navigator.clipboard.writeText(valor).then(() => showToast(`COPIADO: ${valor}`));
}

function sincronizarPortaAuto(abaId) {
    const aba = document.getElementById(abaId);
    const contrato = aba.querySelector('.at_contrato').value.toUpperCase().trim();
    const nome = aba.querySelector('.at_nome_cli').value.toUpperCase().trim();
    const portaSel = aba.querySelector('.at_plib_id').value;
    if (portaSel !== "NENHUMA" && (contrato !== "" || nome !== "")) {
        const numPorta = portaSel.replace("PORTA ", "");
        const inputPorta = aba.querySelector(`.pt${numPorta}`);
        if (inputPorta) inputPorta.value = `USOU A PORTA ${numPorta} - ${contrato} - ${nome}`;
    }
    sincronizarResumo(abaId);
}

function sincronizarResumo(abaId) {
    const aba = document.getElementById(abaId);
    const get = (cls) => (aba.querySelector('.'+cls).value || '').toUpperCase().trim();
    const idPortaRetirada = get('at_plib_num');
    aba.querySelector('.res-chat').innerText = get('at_chat') || '-';
    aba.querySelector('.res-os').innerText = get('at_os') || '-';
    aba.querySelector('.res-contrato').innerText = get('at_contrato') || '-';
    aba.querySelector('.res-nome').innerText = get('at_nome_cli') || '-';
    aba.querySelector('.res-cto').innerText = get('at_cto') || '-';
    aba.querySelector('.res-porta-retirada').innerText = idPortaRetirada || '-';
    aba.querySelector('.res-cidade').innerText = get('sat_cidade') || '-';
    aba.querySelector('.res-loc-cto').innerText = get('sat_loc_cto_ordem') || '-';
    aba.querySelector('.res-loc-cli').innerText = get('sat_loc_cli') || '-';
    const modelo = parseInt(aba.querySelector('.at_modelo_cto').value);
    for(let i=1; i<=modelo; i++){
        const inputPorta = aba.querySelector(`.pt${i}`);
        if(inputPorta) {
            const val = inputPorta.value.toUpperCase().trim();
            if(idPortaRetirada !== "" && val !== "" && val === idPortaRetirada) inputPorta.classList.add('porta-conflito');
            else inputPorta.classList.remove('porta-conflito');
        }
    }
}

function abrirLinkExterno(btn) {
    const input = btn.previousElementSibling;
    if (input && input.value.includes('http')) window.open(input.value, '_blank');
}

function extrairCoordenadasDeTexto(texto) {
    if (!texto) return "";
    const regexCoords = /(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/;
    const match = texto.match(regexCoords);
    return match ? `${match[1]},${match[2]}` : texto.trim();
}

function puxarCaminhoRedeAutomatico(abaId, idCto) {
    if (!idCto) return;
    const ctoLimpa = idCto.trim().toUpperCase();
    const mapaCaminhos = JSON.parse(localStorage.getItem('mapa_cto_caminhos') || '{}');
    if (mapaCaminhos[ctoLimpa]) {
        document.getElementById(abaId).querySelector('.at_caminho_rede').value = mapaCaminhos[ctoLimpa];
        showToast("CAMINHO DE REDE RECUPERADO!");
        validarCamposTempoReal(abaId);
    }
}

let timerBusca;
function monitorarCoordenadas(abaId, valor, campoElemento) {
    clearTimeout(timerBusca);
    if (!valor) { if(campoElemento) campoElemento.nextElementSibling.style.display = 'none'; return; }
    if (campoElemento) campoElemento.nextElementSibling.style.display = valor.includes('http') ? 'block' : 'none';
    const coordsLimpas = extrairCoordenadasDeTexto(valor);
    if (coordsLimpas !== valor && coordsLimpas.includes(',')) { if(campoElemento) campoElemento.value = coordsLimpas; }
    timerBusca = setTimeout(() => { if (/[0-9]/.test(coordsLimpas) && coordsLimpas.includes(',')) buscarCidadePorCoordenadas(abaId, coordsLimpas); sincronizarResumo(abaId); }, 800);
}

function limparIdCTO(rawId) {
    if(!rawId) return "";
    let limpo = rawId.toUpperCase().replace(/CTO A VALIDAR:|CTO RESERVADA:|CTO:|LOCALIZAÇÃO DA CTO:|LOCALIZAÇÃO CLIENTE:|LOCALIZAÇÃO:|LOCALIZAÇÃO|LOCALIZA/g, "");
    return limpo.trim().replace(/^CTO\s+/g, "CTO").replace(/\s+/g, " ");
}

async function buscarCidadePorCoordenadas(abaId, coordenadas) {
    if (!coordenadas || coordenadas.includes('http')) return;
    const coordsLimpas = coordenadas.replace(/\s/g, '').split(',');
    if (coordsLimpas.length !== 2) return;
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coordsLimpas[0]}&lon=${coordsLimpas[1]}&zoom=10`);
        const data = await response.json();
        if (data && data.address) {
            const cidade = data.address.city || data.address.town || data.address.village || "";
            const uf = data.address['ISO3166-2-lvl4'] ? data.address['ISO3166-2-lvl4'].split('-')[1] : "";
            if (cidade) {
                document.getElementById(abaId).querySelector('.sat_cidade').value = `${cidade.toUpperCase()} / ${uf.toUpperCase()}`;
                sincronizarResumo(abaId);
                showToast(`LOCALIZADO: ${cidade}`);
            }
        }
    } catch (e) { console.error(e); }
}

function processarScriptIndividual(abaId) {
    const aba = document.getElementById(abaId);
    const texto = aba.querySelector('.at_import_texto').value;
    if(!texto) return;
    const capturar = (regex) => { const match = texto.match(regex); return match ? match[1].trim() : ""; };
    
    // --- LÓGICA DE VALIDAÇÃO DE CONTRATO (SOLICITADA) ---
    const validarInformacaoMapeamento = (v) => {
        const limpo = v.toUpperCase().trim();
        // Regex para validar se tem SOMENTE números e se a quantidade está entre 4 e 7
        const apenasNumeros = /^\d+$/.test(limpo);
        if (apenasNumeros && limpo.length >= 4 && limpo.length <= 7) {
            return limpo;
        }
        return ""; // Se tiver vogal, consoante ou tamanho fora da regra, fica em branco
    };

    const os = capturar(/Ordem:\s*(\d+)/i);
    const chat = capturar(/ID Chat:\s*(\w+)/i);
    let ctoBruta = capturar(/CTO a validar:\s*(.*?)(?=Localização|$)/is) || capturar(/CTO Reservada:\s*(.*?)(?=Localização|$)/is);
    const locCliente = extrairCoordenadasDeTexto(capturar(/Localização Cliente:\s*(.*?)(?=\n|$)/i));
    const locCto = extrairCoordenadasDeTexto(capturar(/Localização da CTO:\s*(.*?)(?=\n|$)/i) || capturar(/Localização:\s*(.*?)(?=\n|$)/i));
    const ctoLimpada = limparIdCTO(ctoBruta);
    
    aba.querySelector('.at_chat').value = chat;
    aba.querySelector('.at_os').value = os;
    aba.querySelector('.at_cto').value = ctoLimpada;
    aba.querySelector('.sat_cliente').value = os;
    aba.querySelector('.sat_ctovald').value = ctoLimpada;
    const campoLocCli = aba.querySelector('.sat_loc_cli');
    const campoLocCto = aba.querySelector('.sat_loc_cto_ordem');
    campoLocCli.value = locCliente; campoLocCto.value = locCto;
    
    puxarCaminhoRedeAutomatico(abaId, ctoLimpada);
    monitorarCoordenadas(abaId, locCliente, campoLocCli);
    monitorarCoordenadas(abaId, locCto, campoLocCto);
    
    const modelo = capturar(/Portas da CTO:\s*(\d+)/i).includes("8") ? "8 PORTAS" : "16 PORTAS";
    aba.querySelector('.at_modelo_cto').value = modelo;
    atualizarInterfaceAT(abaId, modelo);
    
    for(let i=1; i<=parseInt(modelo); i++){
        const rPorta = new RegExp(`IDENTIFICAÇÃO PORTA ${i}:\\s*(.*)`, "i");
        let v = capturar(rPorta);
        const input = aba.querySelector(`.pt${i}`);
        if(input) input.value = validarInformacaoMapeamento(v); 
    }
    
    aba.querySelector('details').open = false;
    sincronizarResumo(abaId);
    validarCamposTempoReal(abaId);
    showToast("DADOS IMPORTADOS!");
}

function gerarScript(id) {
    const aba = document.getElementById(id);
    const get = (c) => aba.querySelector('.'+c).value.toUpperCase().trim();
    const mod = get('at_modelo_cto');
    const obs = (aba.querySelector('.at_obs_select').value === 'MANUAL') ? get('at_obs_manual') : get('at_obs_select');
    let s = `ID CHAT: ${get('at_chat')}\nORDEM DE SERVIÇO: ${get('at_os')}\nID CTO: ${get('at_cto')}\nCAMINHO DE REDE CTO: ${get('at_caminho_rede')}\nMODELO: ${mod}\nPORTA UTILIZADA: ${get('at_plib_id')} \nID PORTA RETIRADA:${get('at_plib_num')}\nCORREÇÃO CAMINHO PORTA UTILIZADA: ${get('at_correcao_caminho')}\nOBS: ${obs}\n\nMAPA:\n`;
    
    for(let i=1; i<=parseInt(mod); i++){
        let v = aba.querySelector(`.pt${i}`).value.toUpperCase().trim();
        // --- LÓGICA DO SCRIPT: SE ESTIVER EM BRANCO NO FORM, VIRA "SEM ID" (SOLICITADA) ---
        if (v === "") v = "SEM ID";
        s += `P${i.toString().padStart(2,'0')}: ${v}\n`;
    }
    
    const out = aba.querySelector('.at-output');
    out.innerText = s; out.style.display = 'block';
    aba.querySelector('.btn-copy').style.display = 'block';
}

function salvarAtendimento(id) {
    const aba = document.getElementById(id);
    const btnSave = document.getElementById(`btn-finish-${id}`);
    const getVal = (cls) => (aba.querySelector('.'+cls) ? aba.querySelector('.'+cls).value.toUpperCase().trim() : '');
    if (!getVal('at_chat') || !getVal('at_os') || !getVal('at_cto')) { showToast("PREENCHA OS CAMPOS OBRIGATÓRIOS!", "var(--accent-red)"); return; }
    let hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    let portasAtuais = [];
    const qtd = parseInt(getVal('at_modelo_cto'));
    for(let i=1; i<=qtd; i++) {
        const ptInput = aba.querySelector(`.pt${i}`);
        // Salva "SEM ID" no histórico se estiver vazio para consistência
        portasAtuais.push(ptInput && ptInput.value.trim() !== "" ? ptInput.value.toUpperCase().trim() : "SEM ID");
    }
    const regIdExistente = aba.querySelector('.at_id_reg').value;
    let dados = {
        id_reg: regIdExistente || Date.now(), timestamp: new Date().toLocaleString(),
        chat: getVal('at_chat'), os: getVal('at_os'), contrato: getVal('at_contrato'), cliente: getVal('at_nome_cli'),
        cto: getVal('at_cto'), caminho_rede: getVal('at_caminho_rede'), modelo: getVal('at_modelo_cto'),
        porta_utilizada: getVal('at_plib_id'), porta_retirada: getVal('at_plib_num'), correcao: getVal('at_correcao_caminho'),
        obs: (aba.querySelector('.at_obs_select').value === 'MANUAL') ? getVal('at_obs_manual') : getVal('at_obs_select'),
        portas: portasAtuais, sat_bko: getVal('sat_bko'), sat_data: getVal('sat_data'), sat_cidade: getVal('sat_cidade'),
        sat_loc_cli: getVal('sat_loc_cli'), sat_loc_cto: getVal('sat_loc_cto_ordem'), sat_obs: getVal('sat_obs')
    };
    const idx = hist.findIndex(x => x.id_reg == dados.id_reg);
    if(idx !== -1) hist[idx] = dados; else hist.unshift(dados);
    localStorage.setItem('atend_logs_v10', JSON.stringify(hist));
    aba.querySelector('.at_id_reg').value = dados.id_reg;
    btnSave.innerHTML = "✅ SALVO!";
    setTimeout(() => { btnSave.innerHTML = "✅ SALVAR NO HISTÓRICO"; }, 2000);
    carregarHistorico();
    showToast("ATENDIMENTO SALVO COM SUCESSO!");
}

function carregarHistorico() {
    const hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    const tbody = document.querySelector('#tabelaHist tbody');
    if (tbody) {
        tbody.innerHTML = hist.map(r => `
            <tr>
                <td>${r.timestamp}</td><td>${r.chat}</td><td>${r.os}</td><td>${r.cto}</td><td>${r.correcao}</td><td>${r.obs}</td>
                <td>
                    <button class="btn-action" style="background:var(--header-color)" onclick="editarRegistro(${r.id_reg})">✏️</button>
                    <button class="btn-action" style="background:var(--accent-red)" onclick="abrirModalExcluir(${r.id_reg})">🗑️</button>
                </td>
            </tr>
        `).join('');
    }
    atualizarMetricas();
}

function editarRegistro(id) {
    const hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    const r = hist.find(x => x.id_reg == id);
    if(!r) return;
    let abasAtivas = document.querySelectorAll('.tab-content:not(#tab-historico)');
    let abaId = abasAtivas.length > 0 ? abasAtivas[0].id : (adicionarNovaAba(), document.querySelectorAll('.tab-content:not(#tab-historico)')[0].id);
    const aba = document.getElementById(abaId);
    aba.querySelector('.at_id_reg').value = r.id_reg;
    aba.querySelector('.at_chat').value = r.chat;
    aba.querySelector('.at_os').value = r.os;
    aba.querySelector('.at_contrato').value = r.contrato;
    aba.querySelector('.at_nome_cli').value = r.cliente;
    aba.querySelector('.at_cto').value = r.cto;
    aba.querySelector('.at_caminho_rede').value = r.caminho_rede;
    aba.querySelector('.at_modelo_cto').value = r.modelo;
    atualizarInterfaceAT(abaId, r.modelo);
    if(r.portas) r.portas.forEach((p, i) => { const inp = aba.querySelector(`.pt${i+1}`); if(inp) inp.value = (p === "SEM ID" ? "" : p); });
    aba.querySelector('.at_plib_id').value = r.porta_utilizada;
    aba.querySelector('.at_plib_num').value = r.porta_retirada;
    aba.querySelector('.at_correcao_caminho').value = r.correcao;
    validarCamposTempoReal(abaId);
    sincronizarResumo(abaId);
    showTab(abaId, document.getElementById(`btn-${abaId}`));
    showToast("DADOS CARREGADOS!");
}

function toggleSaturada(id) { document.getElementById(`sat-form-${id}`).classList.toggle('active'); }
function copiarScript(btn) { navigator.clipboard.writeText(btn.previousElementSibling.innerText).then(() => showToast("COPIADO!")); }
function showTab(id, btn) { document.querySelectorAll('.tab-content, .tab-btn').forEach(x => x.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }

    e.stopPropagation();

        document.getElementById(id).remove(); document.getElementById(`btn-${id}`).remove(); document.querySelectorAll('.tab-btn')[0].click();

function limparForm(id) {
    abrirModalPersonalizado("⚠️ LIMPAR FORMULÁRIO", "EXISTEM DADOS NÃO SALVOS NESTE FORMULÁRIO. LIMPAR MESMO ASSIM?", () => {

function atualizarInterfaceAT(id, modelo) {
    const qtd = parseInt(modelo); const grid = document.getElementById(`grid-${id}`); grid.innerHTML = '';

    for(let i=1; i<=qtd; i++){
        grid.innerHTML += `<div class="porta-item"><span>P${i}</span><input type="text" class="pt${i}" placeholder="ID" oninput="sincronizarResumo('${id}')"></div>`;
        o += `<option value="PORTA ${i}">PORTA ${i}</option>`;
    }
    sel.innerHTML = o;
}

function toggleObsManual(id, val) { const area = document.querySelector(`#${id} .at_obs_manual`); if(area) area.style.display = (val === 'MANUAL' ? 'block' : 'none'); }
function filtrarHistorico() { const v = document.getElementById('inputBusca').value.toUpperCase(); document.querySelectorAll('#tabelaHist tbody tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(v) ? '' : 'none'); }

function copiarSomentePortas(abaId) {

}
