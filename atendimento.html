<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro de Atendimento - Pro v2.0</title>
    <style>
        :root {
            --bg-body: #0d1117; --bg-container: #161b22; --text-main: #c9d1d9;
            --border-color: #30363d; --input-bg: #0d1117; --header-color: #58a6ff;
            --card-before: #21262d; --accent-green: #00b894; --accent-red: #d63031;
            --accent-orange: #e67e22; --accent-purple: #a29bfe;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); padding: 20px; color: var(--text-main); margin: 0; text-transform: uppercase; }
        .container { max-width: 1450px; margin: auto; background: var(--bg-container); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); position: relative; }
        
        .tabs-nav { display: flex; gap: 5px; margin-bottom: -1px; align-items: center; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 18px; cursor: pointer; background: #21262d; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px 8px 0 0; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: var(--bg-container); border-bottom: 2px solid var(--header-color); color: var(--header-color); }
        .btn-close-tab { font-size: 14px; opacity: 0.5; transition: 0.3s; padding: 2px 5px; border-radius: 4px; }
        .btn-close-tab:hover { opacity: 1; background: var(--accent-red); color: white; }
        
        .btn-add-tab { background: var(--accent-green); color: white; border: none; border-radius: 6px; width: 35px; height: 35px; cursor: pointer; font-weight: bold; font-size: 20px; margin-left: 10px; flex-shrink: 0; }
        
        .tab-content { display: none; border: 1px solid var(--border-color); padding: 25px; border-radius: 0 10px 10px 10px; background: var(--bg-container); animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--accent-green); color: white; padding: 15px 30px; border-radius: 8px; font-weight: 800; font-size: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.5s ease 2.5s forwards; border-left: 6px solid #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: var(--bg-container); border: 1px solid var(--accent-red); border-radius: 15px; padding: 35px; width: 420px; text-align: center; box-shadow: 0 0 40px rgba(214, 48, 49, 0.3); animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { color: var(--accent-red); margin-top: 0; font-size: 20px; letter-spacing: 1px; }
        .modal-card p { color: var(--text-main); font-size: 13px; margin: 20px 0; line-height: 1.6; }
        .modal-btns { display: flex; gap: 12px; justify-content: center; }
        .btn-modal { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; flex: 1; }
        .btn-modal-confirm { background: var(--accent-red); color: white; }
        .btn-modal-confirm:hover { background: #ff7675; transform: scale(1.05); }
        .btn-modal-cancel { background: #485e74; color: white; }

        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-group { margin-bottom: 10px; }
        .input-group label { font-size: 10px; font-weight: 700; margin-bottom: 4px; display: block; color: #8b949e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); font-size: 12px; box-sizing: border-box; outline: none; text-transform: uppercase; transition: 0.3s; }
        
        .saturada-container { background: #1e1515; border: 1px solid var(--accent-red); border-radius: 8px; padding: 20px; margin-top: 25px; display: none; }
        .saturada-container.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .portas-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: var(--card-before); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .porta-item { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: bold; }
        .porta-item input { height: 28px; padding: 4px 8px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-primary { background: var(--header-color); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; flex: 1; text-transform: uppercase; min-width: 150px; transition: 0.3s; }
        .btn-sat-toggle { background: var(--accent-orange); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; padding: 12px; flex: 1; min-width: 150px; }
        .btn-copy { background: var(--accent-green); color: white; display: none; margin-top: 10px; width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; }
        .btn-finish { background: var(--accent-green); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; padding: 12px; flex: 1; min-width: 150px; transition: 0.3s; }
        .btn-finish.success-anim { background: #ffffff !important; color: #000 !important; transform: scale(1.05); }
        .btn-clear { background: #485e74; color: white; width: 60px; border: none; border-radius: 6px; cursor: pointer; }
        
        .script-output { background: #011627; color: #addb67; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; display: none; white-space: pre-wrap; border-left: 4px solid var(--accent-green); font-size: 12px; margin-top: 15px; }
        .sat-output { border-left: 4px solid var(--accent-red); color: #ff9ff3; line-height: 1.4; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .history-table th, .history-table td { padding: 12px; border: 1px solid var(--border-color); text-align: left; }
        .history-table th { background: var(--card-before); color: var(--header-color); }
        .btn-action { padding: 6px; cursor: pointer; border-radius: 4px; border: none; color: white; margin-right: 4px; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .metric-card { background: #1c2128; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--accent-purple); }
        .metric-day { font-size: 10px; color: #8b949e; margin-bottom: 5px; font-weight: bold; }
        .metric-qty { font-size: 20px; font-weight: 800; color: var(--header-color); }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="modalConfirm" class="modal-overlay">
    <div class="modal-card">
        <h2>⚠️ CONFIRMAR EXCLUSÃO</h2>
        <p>VOCÊ REALMENTE DESEJA ELIMINAR ESTE REGISTRO DO HISTÓRICO? ESSA OPERAÇÃO É IRREVERSÍVEL.</p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" onclick="fecharModal()">CANCELAR</button>
            <button id="btnConfirmarExcluir" class="btn-modal btn-modal-confirm">EXCLUIR AGORA</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="tabs-nav" id="main-nav">
        <button class="btn-add-tab" title="Nova Aba" onclick="adicionarNovaAba()">+</button>
        <button class="tab-btn" id="btn-historico" style="margin-left: auto; color: var(--accent-green);" onclick="showTab('tab-historico', this)">🗄️ HISTÓRICO</button>
    </div>

    <div id="at-area"></div>

    <div id="tab-historico" class="tab-content">
        <h3 style="color:var(--accent-green)">🗄️ RESUMO DOS ÚLTIMOS 7 DIAS</h3>
        <div class="metrics-grid" id="metrics-daily"></div>
        <input type="text" id="inputBusca" style="margin-bottom:15px; padding:12px;" placeholder="🔍 BUSCAR NO HISTÓRICO..." onkeyup="filtrarHistorico()">
        <div style="overflow-x: auto;">
            <table class="history-table" id="tabelaHist">
                <thead>
                    <tr><th>DATA/HORA</th><th>ID CHAT</th><th>OS</th><th>CTO</th><th>CORREÇÃO</th><th>OBS</th><th>AÇÕES</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let abaCount = 0;
let dadosTemporarios = {};
let idParaRemover = null;

window.onload = function() {
    adicionarNovaAba();
    carregarHistorico();
};

function showToast(msg, color = 'var(--accent-green)') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = color;
    toast.innerHTML = `<span>📂</span> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }

function adicionarNovaAba() {
    abaCount++;
    const id = `tab-at-${abaCount}`;
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = `btn-${id}`;
    btn.innerHTML = `📝 ATEND. ${abaCount} ${abaCount > 1 ? `<span class="btn-close-tab" onclick="fecharAba(event, '${id}')">✖</span>` : ''}`;
    btn.onclick = (e) => showTab(id, btn);
    document.querySelector('.btn-add-tab').before(btn);

    const html = `
    <div id="${id}" class="tab-content">
        <input type="hidden" class="at_id_reg" value="">

        <details class="import-box" open>
            <summary>📥 IMPORTAR SCRIPT DE CAMPO</summary>
            <textarea class="at_import_texto" style="height: 120px; text-transform: none;" placeholder="COLE O SCRIPT DO TÉCNICO AQUI..."></textarea>
            <button class="btn-primary" style="background: var(--accent-purple); margin-top:10px;" onclick="processarScriptIndividual('${id}')">PROCESSAR DADOS</button>
        </details>

        <div class="grid-main">
            <div>
                <h3 style="color:var(--header-color)">📋 REGISTRO DE ATENDIMENTO</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group"><label>ID CHAT</label><input type="text" class="at_chat"></div>
                    <div class="input-group"><label>ORDEM DE SERVIÇO</label><input type="text" class="at_os"></div>
                    <div class="input-group" style="grid-column:span 2"><label>ID CTO</label><input type="text" class="at_cto" oninput="puxarCaminhoRedeAutomatico('${id}', this.value)"></div>
                    <div class="input-group" style="grid-column:span 2"><label>CAMINHO DE REDE CTO</label><input type="text" class="at_caminho_rede"></div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>MODELO CTO</label>
                        <select class="at_modelo_cto" onchange="atualizarInterfaceAT('${id}', this.value)">
                            <option value="16 PORTAS">16 PORTAS</option>
                            <option value="8 PORTAS">8 PORTAS</option>
                        </select>
                    </div>
                    <div class="input-group"><label>PORTA UTILIZADA</label><select class="at_plib_id"></select></div>
                    <div class="input-group"><label>ID PORTA RETIRADA</label><input type="text" class="at_plib_num"></div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>CORREÇÃO DE CAMINHO DA PORTA LIBERADA ?</label>
                        <select class="at_correcao_caminho"><option value="NAO">NÃO</option><option value="SIM">SIM</option></select>
                    </div>
                    <div class="input-group" style="grid-column:span 2">
                        <label>OBSERVAÇÕES</label>
                        <select class="at_obs_select" onchange="toggleObsManual('${id}', this.value)">
                            <option value="SEM OBSERVAÇÕES ADICIONAIS.">SELECIONE UMA OPÇÃO...</option>
                            <option value="CTO MAIS PROXIMA DA CASA DO CLIENTE.">CTO MAIS PROXIMA DA CASA DO CLIENTE.</option>
                            <option value="USOU A PORTA RESERVADA PARA O CLIENTE">USOU A PORTA RESERVADA PARA O CLIENTE</option>
                            <option value="MANUAL">OUTRO...</option>
                        </select>
                        <textarea class="at_obs_manual" style="display:none; margin-top:10px;"></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="gerarScript('${id}')">🚀 GERAR SCRIPT</button>
                    <button class="btn-finish" id="btn-finish-${id}" onclick="salvarAtendimento('${id}')">✅ SALVAR NO HISTÓRICO</button>
                    <button class="btn-sat-toggle" onclick="toggleSaturada('${id}')">⚠️ RELATAR SATURAÇÃO</button>
                    <button class="btn-clear" onclick="limparForm('${id}')">🗑️</button>
                </div>
                <div class="script-output at-output"></div>
                <button class="btn-copy" onclick="copiarScript(this)">📋 COPIAR SCRIPT</button>
            </div>
            <div>
                <h3 style="opacity:0.7">🔌 MAPEAR PORTAS</h3>
                <div class="portas-container" id="grid-${id}"></div>
            </div>
        </div>

        <div id="sat-form-${id}" class="saturada-container">
            <h3 style="color:var(--accent-red); margin-top:0;">🚫 RELATÓRIO DE CTO SATURADA</h3>
            <div class="grid-main">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group"><label>BKO RESPONSÁVEL</label><input type="text" class="sat_bko" value="CAIO BRANDÃO"></div>
                    <div class="input-group"><label>DATA</label><input type="date" class="sat_data"></div>
                    <div class="input-group"><label>CIDADE/UF</label><input type="text" class="sat_cidade"></div>
                    <div class="input-group"><label>ORDEM DE SERVIÇO (ATENDIMENTO)</label><input type="text" class="sat_cliente"></div>
                    <div class="input-group"><label>CTO VALIDADA</label><input type="text" class="sat_ctovald"></div>
                    <div class="input-group"><label>COORDENADAS CLIENTE</label><input type="text" class="sat_loc_cli" oninput="monitorarCoordenadas('${id}', this.value)"></div>
                    <div class="input-group" style="grid-column: span 2"><label>MOTIVO / PARECER TÉCNICO</label><textarea class="sat_obs" placeholder="DESCREVA A ANÁLISE FEITA NO LOCAL..."></textarea></div>
                </div>
                <div>
                    <div class="input-group"><label>COORDENADAS CTO MAIS PROXIMA</label><input type="text" class="sat_loc_cto_ordem" oninput="monitorarCoordenadas('${id}', this.value)"></div>
                    <button class="btn-primary" style="background: var(--accent-orange); width:100%; margin-top:25px;" onclick="gerarScriptSaturada('${id}')">🚀 GERAR RELATÓRIO TÉCNICO</button>
                </div>
            </div>
            <div class="script-output sat-output"></div>
            <button class="btn-copy" onclick="copiarScript(this)">📋 COPIAR RELATÓRIO PROFISSIONAL</button>
        </div>
    </div>`;
    
    document.getElementById('at-area').insertAdjacentHTML('beforeend', html);
    atualizarInterfaceAT(id, "16 PORTAS");
    
    const campoData = document.getElementById(id).querySelector('.sat_data');
    campoData.value = new Date().toISOString().split('T')[0];

    showTab(id, btn);
}

function puxarCaminhoRedeAutomatico(abaId, idCto) {
    if (!idCto) return;
    const ctoLimpa = idCto.trim().toUpperCase();
    const mapaCaminhos = JSON.parse(localStorage.getItem('mapa_cto_caminhos') || '{}');
    if (mapaCaminhos[ctoLimpa]) {
        document.getElementById(abaId).querySelector('.at_caminho_rede').value = mapaCaminhos[ctoLimpa];
        showToast("CAMINHO DE REDE RECUPERADO!");
    }
}

let timerBusca;
function monitorarCoordenadas(abaId, valor) {
    clearTimeout(timerBusca);
    if (!valor) return;
    let coordsParaBusca = valor;
    if (valor.includes('@')) {
        const m = valor.match(/@([\-\d\.]+),([\-\d\.]+)/);
        if (m) coordsParaBusca = `${m[1]},${m[2]}`;
    }
    timerBusca = setTimeout(() => {
        if (/[0-9]/.test(coordsParaBusca) && coordsParaBusca.includes(',')) {
            buscarCidadePorCoordenadas(abaId, coordsParaBusca);
        }
    }, 800);
}

function limparIdCTO(rawId) {
    if(!rawId) return "";
    let limpo = rawId.toUpperCase();
    limpo = limpo.replace(/CTO A VALIDAR:|CTO RESERVADA:|CTO:|LOCALIZAÇÃO DA CTO:|LOCALIZAÇÃO CLIENTE:|LOCALIZAÇÃO:|LOCALIZAÇÃO|LOCALIZA/g, "");
    return limpo.trim().replace(/^CTO\s+/g, "CTO").replace(/\s+/g, " ");
}

async function buscarCidadePorCoordenadas(abaId, coordenadas) {
    if (!coordenadas || coordenadas.includes('http')) return;
    const coordsLimpas = coordenadas.replace(/\s/g, '').split(',');
    if (coordsLimpas.length !== 2) return;
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coordsLimpas[0]}&lon=${coordsLimpas[1]}&zoom=10`, {
            headers: { 'User-Agent': 'RegistroAtendimento/2.0' }
        });
        const data = await response.json();
        if (data && data.address) {
            const cidade = data.address.city || data.address.town || data.address.village || data.address.municipality || "";
            const estado = data.address.state ? data.address.state : "";
            const uf = data.address['ISO3166-2-lvl4'] ? data.address['ISO3166-2-lvl4'].split('-')[1] : estado;
            if (cidade) {
                document.getElementById(abaId).querySelector('.sat_cidade').value = `${cidade.toUpperCase()} / ${uf.toUpperCase()}`;
                showToast(`LOCALIZADO: ${cidade}`);
            }
        }
    } catch (e) { console.error("Erro API Nominatim", e); }
}

function processarScriptIndividual(abaId) {
    const aba = document.getElementById(abaId);
    const texto = aba.querySelector('.at_import_texto').value;
    if(!texto) return;
    const capturar = (regex) => { const match = texto.match(regex); return match ? match[1].trim() : ""; };
    const os = capturar(/Ordem:\s*(\d+)/i);
    let ctoBruta = capturar(/CTO a validar:\s*(.*?)(?=Localização|$)/is) || capturar(/CTO Reservada:\s*(.*?)(?=Localização|$)/is);
    let locCliente = capturar(/Localização Cliente:\s*(.*?)(?=\n|$)/i);
    let locCto = capturar(/Localização da CTO:\s*(.*?)(?=\n|$)/i) || capturar(/Localização:\s*(.*?)(?=\n|$)/i);
    const ctoLimpada = limparIdCTO(ctoBruta);
    aba.querySelector('.at_os').value = os;
    aba.querySelector('.at_cto').value = ctoLimpada;
    aba.querySelector('.sat_cliente').value = os;
    aba.querySelector('.sat_ctovald').value = ctoLimpada;
    aba.querySelector('.sat_loc_cli').value = locCliente; 
    aba.querySelector('.sat_loc_cto_ordem').value = locCto;
    puxarCaminhoRedeAutomatico(abaId, ctoLimpada);
    if(locCliente) monitorarCoordenadas(abaId, locCliente);
    else if(locCto) monitorarCoordenadas(abaId, locCto);
    const modeloBruto = capturar(/Portas da CTO:\s*(\d+)/i);
    const modelo = modeloBruto.includes("8") ? "8 PORTAS" : "16 PORTAS";
    aba.querySelector('.at_modelo_cto').value = modelo;
    atualizarInterfaceAT(abaId, modelo);
    for(let i=1; i<=parseInt(modelo); i++){
        const rPorta = new RegExp(`IDENTIFICAÇÃO PORTA ${i}:\\s*(.*)`, "i");
        let v = capturar(rPorta).toUpperCase().trim();
        const padraoZeros = /^[0]+$/; 
        const tresDigitosPuros = /^\d{3}$/; 
        const contemLetrasOuSimbolos = /[A-ZÀ-Ú!@#$%^&*()]/i; 
        if(v === "" || v === "NT" || v.length < 3 || v.includes("{{") || v.includes("SEM ID") || padraoZeros.test(v) || tresDigitosPuros.test(v) || (contemLetrasOuSimbolos.test(v) && v.length < 3)) {
            v = "SEM ID";
        }
        const input = aba.querySelector(`.pt${i}`);
        if(input) input.value = v; 
    }
    aba.querySelector('details').open = false;
    showToast("DADOS IMPORTADOS!");
}

function gerarScript(id) {
    const aba = document.getElementById(id);
    const get = (c) => aba.querySelector('.'+c).value.toUpperCase();
    const mod = get('at_modelo_cto');
    const obs = (aba.querySelector('.at_obs_select').value === 'MANUAL') ? get('at_obs_manual') : get('at_obs_select');
    
    let s = `ID CHAT: ${get('at_chat')}\nORDEM DE SERVIÇO: ${get('at_os')}\nID CTO: ${get('at_cto')}\nCAMINHO DE REDE CTO: ${get('at_caminho_rede')}\nMODELO: ${mod}\nPORTA UTILIZADA: ${get('at_plib_id')} \nID PORTA RETIRADA:${get('at_plib_num')}\nCORREÇÃO CAMINHO PORTA UTILIZADA: ${get('at_correcao_caminho')}\nOBS: ${obs}\n\nMAPA:\n`;
    
    let portasArr = [];
    for(let i=1; i<=parseInt(mod); i++){
        let v = aba.querySelector(`.pt${i}`).value.toUpperCase().trim();
        if (v === "" || v === "LIVRE") v = "SEM ID";
        portasArr.push(v);
        s += `P${i.toString().padStart(2,'0')}: ${v}\n`;
    }

    dadosTemporarios[id] = { 
        chat: get('at_chat'), 
        os: get('at_os'), 
        cto: get('at_cto'), 
        caminho_rede: get('at_caminho_rede'),
        correcao: get('at_correcao_caminho'), 
        obs: obs, 
        modelo: mod, 
        portas: portasArr 
    };
    
    const out = aba.querySelector('.at-output');
    out.innerText = s;
    out.style.display = 'block';
    aba.querySelector('.btn-copy').style.display = 'block';
}

function gerarScriptSaturada(id) {
    const aba = document.getElementById(id);
    const get = (c) => aba.querySelector('.'+c).value.toUpperCase();
    const dataAtual = new Date().toLocaleDateString('pt-BR');
    const idChatGeral = aba.querySelector('.at_chat').value.toUpperCase();
    let s = `// CTO SATURADA //\n`;
    s += `BKO: ${get('sat_bko')}\n`;
    s += `DATA: ${dataAtual}\n`;
    s += `ID Chat: ${idChatGeral}\n`;
    s += `Cidade: ${get('sat_cidade')}\n`;
    s += `Cliente: ${get('sat_cliente')}\n`;
    s += `CTO Validada: ${get('sat_ctovald')}\n`;
    s += `Loc. Cliente: ${get('sat_loc_cli')}\n`;
    s += `Loc. CTO: ${get('sat_loc_cto_ordem')}\n`;
    s += `Obs: ${get('sat_obs')}`;
    const out = aba.querySelector('.sat-output');
    out.innerText = s;
    out.style.display = 'block';
    out.nextElementSibling.style.display = 'block';
}

function salvarAtendimento(id) {
    const aba = document.getElementById(id);
    const btnSave = document.getElementById(`btn-finish-${id}`);
    const inputIdReg = aba.querySelector('.at_id_reg');
    
    gerarScript(id);
    const d = dadosTemporarios[id];
    
    if(!d.os || !d.cto) {
        showToast("OS E CTO SÃO OBRIGATÓRIOS!", "var(--accent-red)");
        return;
    }

    // Captura dados de saturação
    const satMotivo = aba.querySelector('.sat_obs').value;
    if (satMotivo && satMotivo.trim() !== "") {
        d.saturada = {
            bko: aba.querySelector('.sat_bko').value.toUpperCase(),
            data: aba.querySelector('.sat_data').value,
            cidade: aba.querySelector('.sat_cidade').value.toUpperCase(),
            cto_validada: aba.querySelector('.sat_ctovald').value.toUpperCase(),
            loc_cli: aba.querySelector('.sat_loc_cli').value.toUpperCase(),
            loc_cto: aba.querySelector('.sat_loc_cto_ordem').value.toUpperCase(),
            parecer: satMotivo.toUpperCase()
        };
    }

    if (d.cto && d.caminho_rede) {
        let mapaCaminhos = JSON.parse(localStorage.getItem('mapa_cto_caminhos') || '{}');
        mapaCaminhos[d.cto] = d.caminho_rede;
        localStorage.setItem('mapa_cto_caminhos', JSON.stringify(mapaCaminhos));
    }

    let hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');

    // LÓGICA DE ATUALIZAÇÃO OU CRIAÇÃO
    if (inputIdReg.value) {
        // Se a aba já tem um ID, procura no histórico e atualiza
        const index = hist.findIndex(x => x.id_reg == inputIdReg.value);
        if (index !== -1) {
            d.id_reg = parseInt(inputIdReg.value);
            d.timestamp = hist[index].timestamp; // Mantém a data original da criação
            d.last_update = new Date().toLocaleString(); // Registra última modificação
            hist[index] = d;
            showToast("REGISTRO ATUALIZADO!");
        } else {
            // Caso o ID tenha sido removido do histórico por fora, cria um novo
            d.id_reg = Date.now();
            d.timestamp = new Date().toLocaleString();
            inputIdReg.value = d.id_reg;
            hist.unshift(d);
            showToast("ARQUIVO SALVO!");
        }
    } else {
        // Novo registro
        d.id_reg = Date.now();
        d.timestamp = new Date().toLocaleString();
        inputIdReg.value = d.id_reg;
        hist.unshift(d);
        showToast("ARQUIVO SALVO!");
    }
    
    localStorage.setItem('atend_logs_v10', JSON.stringify(hist));
    
    btnSave.innerHTML = "✅ ATUALIZADO!";
    btnSave.classList.add('success-anim');
    carregarHistorico();
}

function atualizarMetricasPorDia(hist) {
    const container = document.getElementById('metrics-daily');
    container.innerHTML = '';
    const contagem = {};
    for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dataStr = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        contagem[dataStr] = 0;
    }
    hist.forEach(r => {
        const dataRegistro = r.timestamp.split(',')[0].substring(0, 5);
        if (contagem.hasOwnProperty(dataRegistro)) contagem[dataRegistro]++;
    });
    Object.keys(contagem).forEach(data => {
        container.innerHTML += `<div class="metric-card"><div class="metric-day">${data}</div><div class="metric-qty">${contagem[data]}</div></div>`;
    });
}

function carregarHistorico() {
    const hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    const tbody = document.querySelector('#tabelaHist tbody');
    atualizarMetricasPorDia(hist);
    tbody.innerHTML = hist.map(r => `
        <tr>
            <td>${r.timestamp}</td>
            <td>${r.chat}</td>
            <td>${r.os}</td>
            <td>${r.cto}</td>
            <td>${r.correcao}</td>
            <td>${r.obs}</td>
            <td>
                <button class="btn-action" style="background:var(--header-color)" onclick="editarRegistro(${r.id_reg})">✏️</button>
                <button class="btn-action" style="background:var(--accent-red)" onclick="excluirRegistro(${r.id_reg})">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function excluirRegistro(id) {
    idParaRemover = id;
    document.getElementById('modalConfirm').style.display = 'flex';
    document.getElementById('btnConfirmarExcluir').onclick = function() {
        let hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
        hist = hist.filter(x => x.id_reg !== idParaRemover);
        localStorage.setItem('atend_logs_v10', JSON.stringify(hist));
        carregarHistorico();
        fecharModal();
        showToast("REGISTRO REMOVIDO", "var(--accent-red)");
    };
}

function editarRegistro(id) {
    const hist = JSON.parse(localStorage.getItem('atend_logs_v10') || '[]');
    const r = hist.find(x => x.id_reg === id);
    if(!r) return;
    
    let abaId = document.querySelector('.tab-content:not(#tab-historico)').id;
    const aba = document.getElementById(abaId);
    
    // Seta o ID do registro na aba para que o salvar saiba que deve atualizar este item
    aba.querySelector('.at_id_reg').value = r.id_reg;
    
    aba.querySelector('.at_chat').value = r.chat;
    aba.querySelector('.at_os').value = r.os;
    aba.querySelector('.at_cto').value = r.cto;
    aba.querySelector('.at_caminho_rede').value = r.caminho_rede || '';
    aba.querySelector('.at_modelo_cto').value = r.modelo;
    atualizarInterfaceAT(abaId, r.modelo);
    r.portas.forEach((p, i) => { const input = aba.querySelector(`.pt${i+1}`); if(input) input.value = p; });

    if (r.saturada) {
        aba.querySelector('.sat_bko').value = r.saturada.bko;
        aba.querySelector('.sat_data').value = r.saturada.data;
        aba.querySelector('.sat_cidade').value = r.saturada.cidade;
        aba.querySelector('.sat_ctovald').value = r.saturada.cto_validada;
        aba.querySelector('.sat_loc_cli').value = r.saturada.loc_cli;
        aba.querySelector('.sat_loc_cto_ordem').value = r.saturada.loc_cto;
        aba.querySelector('.sat_obs').value = r.saturada.parecer;
        document.getElementById(`sat-form-${abaId}`).classList.add('active');
    }

    showTab(abaId, document.getElementById(`btn-${abaId}`));
}

function toggleSaturada(id) { document.getElementById(`sat-form-${id}`).classList.toggle('active'); }
function copiarScript(btn) { navigator.clipboard.writeText(btn.previousElementSibling.innerText).then(() => showToast("COPIADO!")); }

function showTab(id, btn) {
    document.querySelectorAll('.tab-content, .tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function fecharAba(e, id) { e.stopPropagation(); document.getElementById(id).remove(); document.getElementById(`btn-${id}`).remove(); document.querySelectorAll('.tab-btn')[0].click(); }

function atualizarInterfaceAT(id, modelo) {
    const qtd = parseInt(modelo);
    const grid = document.getElementById(`grid-${id}`);
    grid.innerHTML = '';
    const sel = document.querySelector(`#${id} .at_plib_id`);
    let o = '<option value="NENHUMA">NENHUMA</option>';
    for(let i=1; i<=qtd; i++){
        grid.innerHTML += `<div class="porta-item"><span>P${i}</span><input type="text" class="pt${i}" placeholder="ID"></div>`;
        o += `<option value="PORTA ${i}">PORTA ${i}</option>`;
    }
    sel.innerHTML = o;
}

function toggleObsManual(id, val) { document.querySelector(`#${id} .at_obs_manual`).style.display = (val === 'MANUAL' ? 'block' : 'none'); }

function filtrarHistorico() {
    const v = document.getElementById('inputBusca').value.toUpperCase();
    document.querySelectorAll('#tabelaHist tbody tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(v) ? '' : 'none');
}

function limparForm(id) {
    const aba = document.getElementById(id);
    aba.querySelector('.at_id_reg').value = ''; // Limpa o ID vinculado
    aba.querySelectorAll('input, textarea').forEach(i => { if(!i.classList.contains('sat_bko') && i.type !== 'hidden') i.value = ''; });
    aba.querySelector('.sat_data').value = new Date().toISOString().split('T')[0];
    aba.querySelectorAll('.script-output, .btn-copy').forEach(el => el.style.display = 'none');
    document.getElementById(`sat-form-${id}`).classList.remove('active');
    const btnSave = document.getElementById(`btn-finish-${id}`);
    btnSave.innerHTML = "✅ SALVAR NO HISTÓRICO";
    btnSave.classList.remove('success-anim');
    dadosTemporarios[id] = null;
}
</script>
